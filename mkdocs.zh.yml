site_name: 灵犀指令集架构
site_description: 灵犀指令集公开文档
site_url: https://linxisa.github.io/
repo_url: https://github.com/LinxISA/linx-isa
repo_name: LinxISA/linx-isa
edit_uri: edit/main/docs/zh/
docs_dir: docs/zh

exclude_docs: |
  /README.md
  architecture/isa-manual/.bundle/**
  architecture/isa-manual/build/**
  architecture/isa-manual/vendor/**

theme:
  name: material
  language: zh
  logo: assets/linxisa-logo.svg
  favicon: assets/linxisa-favicon.svg
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra:
  generator: false

extra_css:
  - stylesheets/linxisa.css

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: relative_to_docs
  links:
    not_found: warn
    absolute_links: relative_to_docs

nav:
  - 首页: index.md
  - 设计背景: background/index.md
  - ISA 导航:
      - ISA 首页: isa/index.md
      - 总体架构: isa/arch/bisa.md
      - 架构寄存器与状态: isa/register/common/intro.md
      - 数据类型: isa/datatype/intro.md
      - 指令编码: isa/encoding.md
      - 指令族总览: isa/instset/baseInstrs.md
      - 块类型介绍: isa/blockIntro/std_block/intro.md
      - 分组索引: isa/groups/index.md
      - 指令 A-Z: isa/instructions/index.md
  - 编译与工具:
      - 编程手册: compiler/manuals.md
      - 链接与运行: compiler/linker.md
      - QEMU Slice: compiler/qemu_slices.md
      - 运行 C 程序: compiler/run_c_program.md
  - 参考与示例:
      - 参考总览: reference/README.md
      - 样例总览: reference/examples/README.md
      - v0.56 示例包: reference/examples/v0.56/README.md
      - 编码空间分析: reference/encoding_space_report.md
      - 汇编代理指南: reference/linxisa-assembly-agent-guide.md
      - Call/Ret 合同: reference/linxisa-call-ret-contract.md
  - 架构合同:
      - 合同总览: architecture/README.md
      - v0.56 合同: architecture/v0.56-architecture-contract.md
      - v0.56 加固策略: architecture/v0.56-hardening-policy.md
      - ISA Manual: architecture/isa-manual/README.md
      - LinxCore 总览: architecture/linxcore/overview.md
  - Bring-up:
      - Bring-up 首页: bringup/README.md
      - 快速开始: bringup/GETTING_STARTED.md
      - 进展: bringup/PROGRESS.md
      - Gate 状态: bringup/GATE_STATUS.md
  - 发布:
      - v0.56.2: releases/v0.56.2.md
      - v0.3.0: releases/v0.3.0.md
  - 项目与治理:
      - 项目首页: project/README.md
      - 导航契约: project/navigation.md
      - 仓库流程: project/repository-flow.md

name: public-v056-guards

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check v0.56 golden artifacts
        run: python3 tools/isa/build_golden.py --profile v0.56 --check

      - name: Validate v0.56 ISA spec
        run: python3 tools/isa/validate_spec.py --profile v0.56

      - name: Enforce canonical v0.56 guard
        run: python3 tools/isa/check_canonical_v056.py --root .

      - name: Enforce Repository Layout
        run: bash tools/ci/check_repo_layout.sh

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs + Material theme
        run: |
          python -m pip install --upgrade pip "mkdocs<2" mkdocs-material

      - name: Build English docs
        run: mkdocs build --strict

      - name: Build Chinese docs
        run: mkdocs build --strict -f mkdocs.zh.yml -d site/zh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

        - 微架构契约: architecture/linxcore/microarchitecture.md
        - 外部接口契约: architecture/linxcore/interfaces.md
        - 验证矩阵: architecture/linxcore/verification-matrix.md
        - 模块目录: architecture/linxcore/module-catalog.md
        - 流水线阶段目录: architecture/linxcore/pipeline-stage-catalog.md
    - 访问控制环:

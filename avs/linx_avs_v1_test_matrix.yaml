version: linx-avs-v0.56
status: canonical
last_updated: "2026-03-07"

profiles:
  LNX-S32: "Scalar 32-bit, freestanding, little-endian, no MMU"
  LNX-S64: "Scalar 64-bit, freestanding, little-endian, no MMU"
  LNX-PRIV: "Adds ACR/SSR trap envelope behavior (no full OS/MMU required)"
  LNX-ATOM: "Adds atomics and ordering qualifiers"
  LNX-FP: "Adds scalar and vector floating-point behavior"
  LNX-VPAR: "Enables vector parallel blocks"
  LNX-VSEQ: "Enables vector sequential blocks"
  LNX-TILE: "Enables tile blocks and TAU execution"
  LNX-LINUX: "Linux runtime and privileged execution under QEMU"
  LNX-LIBC: "musl/glibc runtime and loader behavior"
  LNX-WORKLOAD: "Benchmarks and maintained workload runners on QEMU"
  LNX-SPEC: "SPEC stage execution under Linx Linux/QEMU"

tiers:
  pr: "Required in normal strict closure."
  nightly: "Required in extended/nightly strict closure."

pass_fail_rules:
  pass: "Expected architectural effects observed; no unexpected traps."
  fail: "Unexpected trap, wrong architectural result, or contract violation."
  trap_expected_pass: "Correct trap class/cause and precise PC capture with no partial side effects."


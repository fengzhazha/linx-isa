<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="900" height="200" fill="#f8fafc" rx="4"/>
  <text x="450" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Execution Modes</text>
  <!-- Scalar Mode -->
  <rect x="20" y="28" width="260" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="150" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Scalar Mode</text>
  <text x="150" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#334155" text-anchor="middle">1 iteration, no parallelism</text>
  <rect x="35" y="68" width="230" height="14" fill="#bfdbfe" rx="3"/>
  <text x="150" y="79" font-family="monospace" font-size="9" fill="#1e40af" text-anchor="middle">i=0</text>
  <!-- Serial Mode -->
  <rect x="320" y="28" width="260" height="60" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="450" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#7e22ce" text-anchor="middle">Serial Mode</text>
  <text x="450" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#334155" text-anchor="middle">Parallel within Groups, serial between</text>
  <rect x="335" y="68" width="100" height="14" fill="#e9d5ff" rx="3"/>
  <rect x="445" y="68" width="100" height="14" fill="#e9d5ff" rx="3"/>
  <text x="385" y="79" font-family="monospace" font-size="9" fill="#7e22ce" text-anchor="middle">G0: i0,i1</text>
  <text x="495" y="79" font-family="monospace" font-size="9" fill="#7e22ce" text-anchor="middle">G1: i2,i3</text>
  <!-- Parallel Mode -->
  <rect x="620" y="28" width="260" height="60" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="750" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#15803d" text-anchor="middle">Parallel Mode</text>
  <text x="750" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#334155" text-anchor="middle">All iterations in parallel</text>
  <rect x="635" y="68" width="230" height="14" fill="#bbf7d0" rx="3"/>
  <text x="750" y="79" font-family="monospace" font-size="9" fill="#15803d" text-anchor="middle">i0 || i1 || i2 || i3 ...</text>
  <!-- Group/Lane scheduling -->
  <text x="20" y="108" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Group/Lane Scheduling</text>
  <!-- Iterations row -->
  <text x="20" y="126" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#64748b">Iteration IDs:</text>
  <rect x="95" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="110" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">0</text>
  <rect x="130" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="145" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">1</text>
  <rect x="165" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="180" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">2</text>
  <rect x="200" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="215" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">3</text>
  <rect x="235" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="250" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">4</text>
  <rect x="270" y="116" width="30" height="16" fill="#e2e8f0" stroke="#94a3b8" rx="2"/>
  <text x="285" y="128" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">5</text>
  <!-- Group boxes -->
  <rect x="95" y="138" width="205" height="48" fill="#ede9fe" stroke="#a855f7" stroke-width="1.5" rx="4"/>
  <text x="197" y="152" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#7e22ce" text-anchor="middle">Group 0</text>
  <rect x="103" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="114" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L0</text>
  <text x="114" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i0</text>
  <rect x="130" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="141" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L1</text>
  <text x="141" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i1</text>
  <rect x="157" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="168" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L2</text>
  <text x="168" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i2</text>
  <rect x="184" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="195" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L3</text>
  <text x="195" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i3</text>
  <rect x="216" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="227" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L4</text>
  <text x="227" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <rect x="243" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="254" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L5</text>
  <text x="254" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <rect x="270" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="281" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L6</text>
  <text x="281" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <rect x="297" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="308" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L7</text>
  <text x="308" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <!-- Group 1 -->
  <rect x="320" y="138" width="205" height="48" fill="#ede9fe" stroke="#a855f7" stroke-width="1.5" rx="4"/>
  <text x="422" y="152" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#7e22ce" text-anchor="middle">Group 1</text>
  <rect x="328" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="339" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L0</text>
  <text x="339" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i4</text>
  <rect x="355" y="156" width="22" height="22" fill="#c4b5fd" rx="3"/>
  <text x="366" y="165" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="middle">L1</text>
  <text x="366" y="174" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">i5</text>
  <rect x="382" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="393" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L2</text>
  <text x="393" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <rect x="409" y="156" width="22" height="22" fill="#ddd6fe" rx="3" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="420" y="165" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">L3</text>
  <text x="420" y="174" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">--</text>
  <!-- Legend -->
  <rect x="560" y="120" width="310" height="70" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
  <text x="715" y="134" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">Legend</text>
  <rect x="570" y="140" width="14" height="10" fill="#bfdbfe" rx="2"/>
  <text x="590" y="149" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Scalar Mode</text>
  <rect x="570" y="154" width="14" height="10" fill="#e9d5ff" rx="2"/>
  <text x="590" y="163" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Serial Mode (Groups)</text>
  <rect x="570" y="168" width="14" height="10" fill="#bbf7d0" rx="2"/>
  <text x="590" y="177" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Parallel Mode</text>
  <rect x="680" y="140" width="14" height="10" fill="#c4b5fd" rx="2"/>
  <text x="700" y="149" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Active Lane</text>
  <rect x="680" y="154" width="14" height="10" fill="#ddd6fe" rx="2" stroke="#c4b5fd" stroke-dasharray="2"/>
  <text x="700" y="163" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Inactive Lane</text>
  <text x="570" y="188" font-family="monospace" font-size="7" fill="#64748b">LaneNum = iteration_id % MAX_LANES_PER_GROUP</text>
</svg>
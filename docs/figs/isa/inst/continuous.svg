<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <marker id="a12" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="200" fill="#f8fafc" rx="4"/>
  <text x="400" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Continuous Address Access within a Group</text>
  <!-- Title -->
  <text x="400" y="40" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#334155" text-anchor="middle">Vector Load/Store: EA(i+1) = EA(i) + E (where E = element size)</text>
  <!-- Group box -->
  <rect x="50" y="50" width="700" height="130" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="8"/>
  <text x="400" y="68" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#7e22ce" text-anchor="middle">Group (MAX_LANES_PER_GROUP lanes)</text>
  <!-- Lanes -->
  <rect x="70" y="78" width="150" height="50" fill="#e9d5ff" stroke="#a855f7" rx="6"/>
  <text x="145" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Lane 0</text>
  <rect x="85" y="102" width="120" height="18" fill="#ddd6fe" rx="3"/>
  <text x="145" y="115" font-family="monospace" font-size="8" fill="#6d28d9" text-anchor="middle">EA(0) = base + offset</text>
  <text x="145" y="126" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Element 0</text>
  <rect x="235" y="78" width="150" height="50" fill="#e9d5ff" stroke="#a855f7" rx="6"/>
  <text x="310" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Lane 1</text>
  <rect x="250" y="102" width="120" height="18" fill="#ddd6fe" rx="3"/>
  <text x="310" y="115" font-family="monospace" font-size="8" fill="#6d28d9" text-anchor="middle">EA(1) = EA(0) + E</text>
  <text x="310" y="126" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Element 1</text>
  <rect x="400" y="78" width="150" height="50" fill="#e9d5ff" stroke="#a855f7" rx="6"/>
  <text x="475" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Lane 2</text>
  <rect x="415" y="102" width="120" height="18" fill="#ddd6fe" rx="3"/>
  <text x="475" y="115" font-family="monospace" font-size="8" fill="#6d28d9" text-anchor="middle">EA(2) = EA(1) + E</text>
  <text x="475" y="126" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Element 2</text>
  <rect x="565" y="78" width="150" height="50" fill="#e9d5ff" stroke="#a855f7" rx="6"/>
  <text x="640" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Lane 3</text>
  <rect x="580" y="102" width="120" height="18" fill="#ddd6fe" rx="3"/>
  <text x="640" y="115" font-family="monospace" font-size="8" fill="#6d28d9" text-anchor="middle">EA(3) = EA(2) + E</text>
  <text x="640" y="126" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Element 3</text>
  <!-- Plus arrows between lanes -->
  <text x="220" y="103" font-family="Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="bold" fill="#a855f7" text-anchor="middle">+</text>
  <line x1="228" y1="98" x2="232" y2="98" stroke="#a855f7" stroke-width="2"/>
  <text x="385" y="103" font-family="Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="bold" fill="#a855f7" text-anchor="middle">+</text>
  <line x1="393" y1="98" x2="397" y2="98" stroke="#a855f7" stroke-width="2"/>
  <text x="550" y="103" font-family="Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="bold" fill="#a855f7" text-anchor="middle">+</text>
  <line x1="558" y1="98" x2="562" y2="98" stroke="#a855f7" stroke-width="2"/>
  <!-- Note -->
  <rect x="50" y="135" width="700" height="35" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="400" y="152" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">Base+Offset: Each lane computes EA = BaseReg + (LaneNum * E) + ImmediateOffset</text>
  <text x="400" y="165" font-family="monospace" font-size="8" fill="#92400e" text-anchor="middle">E = element size (4B for word, 8B for dword, etc.) | LaneNum = iteration_id % MAX_LANES_PER_GROUP</text>
</svg>
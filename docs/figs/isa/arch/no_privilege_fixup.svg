<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <marker id="a6" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="a6b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="500" height="200" fill="#f8fafc" rx="4"/>
  <text x="250" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Fixup Flow (No Privilege Mode)</text>
  <!-- Block instruction -->
  <rect x="20" y="45" width="100" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="70" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Block</text>
  <text x="70" y="82" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Instruction</text>
  <!-- Arrow -->
  <line x1="120" y1="65" x2="145" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Exception -->
  <rect x="155" y="45" width="100" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="205" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#dc2626" text-anchor="middle">Exception</text>
  <text x="205" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">occurs</text>
  <!-- Arrow -->
  <line x1="255" y1="65" x2="280" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Abort & commit -->
  <rect x="290" y="45" width="100" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="340" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#d97706" text-anchor="middle">Abort &amp;</text>
  <text x="340" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#d97706" text-anchor="middle">Commit</text>
  <!-- Arrow -->
  <line x1="390" y1="65" x2="415" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Fixup target -->
  <rect x="425" y="45" width="65" height="40" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="457" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#15803d" text-anchor="middle">Fixup</text>
  <text x="457" y="82" font-family="monospace" font-size="10" font-weight="bold" fill="#15803d" text-anchor="middle">Target</text>
  <!-- Second row -->
  <line x1="340" y1="85" x2="340" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#a6)" transform="rotate(90, 340, 100)"/>
  <line x1="290" y1="115" x2="450" y2="115" stroke="#334155" stroke-width="2"/>
  <line x1="450" y1="115" x2="450" y2="140" stroke="#334155" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Continue execution -->
  <rect x="390" y="140" width="120" height="40" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="450" y="165" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#15803d" text-anchor="middle">Continue</text>
  <text x="450" y="177" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#15803d" text-anchor="middle">Execution</text>
  <!-- Notes -->
  <text x="20" y="200" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#64748b">Note: In no-privilege mode, no EBSTATE save occurs. Fixup target is determined by exception type.</text>
</svg>
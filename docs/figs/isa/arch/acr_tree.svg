<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <marker id="a10" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="a10b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="500" height="200" fill="#f8fafc" rx="4"/>
  <text x="250" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">ACR Privilege Tree</text>
  <!-- ACR0 Root -->
  <rect x="175" y="35" width="150" height="45" fill="#dcfce7" stroke="#22c55e" stroke-width="3" rx="8"/>
  <text x="250" y="55" font-family="monospace" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">ACR0</text>
  <text x="250" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#15803d" text-anchor="middle">Root (highest privilege)</text>
  <!-- Lines to ACR1 and ACR2 -->
  <line x1="220" y1="80" x2="150" y2="105" stroke="#334155" stroke-width="2"/>
  <line x1="280" y1="80" x2="350" y2="105" stroke="#334155" stroke-width="2"/>
  <!-- ACR1 Main -->
  <rect x="75" y="105" width="150" height="45" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="150" y="125" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">ACR1</text>
  <text x="150" y="140" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">Main (OS/supervisor)</text>
  <!-- ACR2 User -->
  <rect x="275" y="105" width="150" height="45" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="8"/>
  <text x="350" y="125" font-family="monospace" font-size="12" font-weight="bold" fill="#7e22ce" text-anchor="middle">ACR2</text>
  <text x="350" y="140" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#7e22ce" text-anchor="middle">User (lowest privilege)</text>
  <!-- Incomparable note -->
  <line x1="225" y1="127" x2="275" y2="127" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="250" y="122" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#dc2626" text-anchor="middle">incomparable</text>
  <!-- Legend -->
  <rect x="20" y="165" width="460" height="30" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
  <text x="30" y="182" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Comparable ACRs: same path, can infer (e.g., ACR0 -> ACR1)</text>
  <text x="320" y="182" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#dc2626">Incomparable: neither dominates (ACR1 || ACR2)</text>
  <!-- Privilege arrows -->
  <text x="20" y="50" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#64748b">High</text>
  <line x1="20" y1="55" x2="20" y2="150" stroke="#94a3b8" stroke-width="1"/>
  <text x="20" y="155" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#64748b">Low</text>
  <line x1="20" y1="55" x2="20" y2="150" stroke="#94a3b8" stroke-width="1" marker-end="url(#a10b)"/>
</svg>
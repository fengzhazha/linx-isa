<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <marker id="a8" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="a8b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="500" height="200" fill="#f8fafc" rx="4"/>
  <text x="250" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Interrupt/Trap Model</text>
  <!-- Step 1: Block execution -->
  <rect x="20" y="45" width="100" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="70" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Block</text>
  <text x="70" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">Execution</text>
  <!-- Arrow -->
  <line x1="120" y1="65" x2="145" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a8)"/>
  <!-- Step 2: Trap occurs -->
  <rect x="155" y="45" width="90" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="200" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#dc2626" text-anchor="middle">Trap</text>
  <text x="200" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">occurs</text>
  <!-- Arrow -->
  <line x1="245" y1="65" x2="270" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a8)"/>
  <!-- Step 3: Save state -->
  <rect x="280" y="45" width="95" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="327" y="65" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#d97706" text-anchor="middle">Save State</text>
  <text x="327" y="78" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#d97706" text-anchor="middle">to EBSTATE</text>
  <!-- Arrow down -->
  <line x1="327" y1="85" x2="327" y2="105" stroke="#334155" stroke-width="2"/>
  <line x1="327" y1="105" x2="450" y2="105" stroke="#334155" stroke-width="2"/>
  <line x1="450" y1="105" x2="450" y2="125" stroke="#334155" stroke-width="2" marker-end="url(#a8)"/>
  <!-- Step 4: Handler -->
  <rect x="390" y="125" width="95" height="40" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="437" y="150" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Handler</text>
  <text x="437" y="162" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#7e22ce" text-anchor="middle">(higher priv)</text>
  <!-- Arrow down -->
  <line x1="437" y1="165" x2="437" y2="180" stroke="#334155" stroke-width="2"/>
  <line x1="437" y1="180" x2="300" y2="180" stroke="#334155" stroke-width="2"/>
  <line x1="300" y1="180" x2="300" y2="170" stroke="#334155" stroke-width="2"/>
  <!-- Step 5: Restore -->
  <rect x="250" y="155" width="95" height="25" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="297" y="171" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">Restore &amp; Resume</text>
  <!-- Privilege levels -->
  <text x="20" y="192" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#64748b">ACR0/ACR1: Full EBSTATE save/restore</text>
  <text x="200" y="192" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#64748b">|</text>
  <text x="210" y="192" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#64748b">No-privilege: No EBSTATE, direct fixup</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="300" fill="#f8fafc" rx="4"/>
  <text x="400" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Block State Architecture</text>
  <!-- Control Registers -->
  <rect x="10" y="30" width="240" height="140" fill="#ede9fe" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="130" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#7e22ce" text-anchor="middle">Control Registers</text>
  <rect x="20" y="54" width="80" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="60" y="69" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">BARG</text>
  <text x="130" y="69" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Block ARg</text>
  <rect x="20" y="80" width="80" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="60" y="95" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">TPC</text>
  <text x="130" y="95" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Thread PC</text>
  <rect x="20" y="106" width="80" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="60" y="121" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">SGPR</text>
  <text x="130" y="121" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Scalar GPR</text>
  <rect x="20" y="132" width="80" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="60" y="147" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">RI/RO</text>
  <text x="130" y="147" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Rcv/ReadOnly</text>
  <!-- Predicate -->
  <rect x="20" y="158" width="80" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="60" y="173" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">PRED</text>
  <text x="130" y="173" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Predicate</text>
  <!-- Loop Control -->
  <rect x="130" y="54" width="110" height="22" fill="#ddd6fe" stroke="#a855f7" rx="4"/>
  <text x="185" y="69" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">LB/LC</text>
  <text x="185" y="158" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Loop Begin/Count</text>
  <!-- Vector Registers -->
  <rect x="270" y="30" width="240" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="390" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Vector Registers</text>
  <rect x="280" y="54" width="90" height="22" fill="#bfdbfe" stroke="#3b82f6" rx="4"/>
  <text x="325" y="69" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">VGPR</text>
  <text x="380" y="69" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Vector GPR</text>
  <rect x="280" y="80" width="90" height="22" fill="#bfdbfe" stroke="#3b82f6" rx="4"/>
  <text x="325" y="95" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">LTAR</text>
  <text x="380" y="95" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Local Tile AR</text>
  <rect x="280" y="106" width="90" height="22" fill="#bfdbfe" stroke="#3b82f6" rx="4"/>
  <text x="325" y="121" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">OTAR</text>
  <text x="380" y="121" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Output Tile AR</text>
  <!-- Tiles -->
  <rect x="390" y="54" width="110" height="74" fill="#bfdbfe" stroke="#3b82f6" rx="4"/>
  <text x="445" y="70" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">Output Tile</text>
  <text x="445" y="84" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">Results written</text>
  <text x="445" y="96" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">here during</text>
  <text x="445" y="108" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">commit phase</text>
  <!-- Memory Registers -->
  <rect x="530" y="30" width="240" height="140" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="650" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="bold" fill="#15803d" text-anchor="middle">Memory</text>
  <rect x="540" y="54" width="100" height="22" fill="#bbf7d0" stroke="#22c55e" rx="4"/>
  <text x="590" y="69" font-family="monospace" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">GMEM_BASE</text>
  <rect x="540" y="80" width="100" height="22" fill="#bbf7d0" stroke="#22c55e" rx="4"/>
  <text x="590" y="95" font-family="monospace" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">GMEM_OFF</text>
  <rect x="540" y="106" width="100" height="22" fill="#bbf7d0" stroke="#22c55e" rx="4"/>
  <text x="590" y="121" font-family="monospace" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">LT_BASE</text>
  <rect x="650" y="54" width="110" height="74" fill="#bbf7d0" stroke="#22c55e" rx="4"/>
  <text x="705" y="70" font-family="monospace" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">Tile Buffers</text>
  <text x="705" y="84" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">Local tiles for</text>
  <text x="705" y="96" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">data-dependent</text>
  <text x="705" y="108" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle">access patterns</text>
  <!-- Summary bar -->
  <rect x="10" y="184" width="780" height="50" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
  <text x="400" y="200" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">Block State Snapshot (saved to EBSTATE on exception)</text>
  <text x="20" y="218" font-family="monospace" font-size="8" fill="#475569">BARG: Block Address Register (points to current block)</text>
  <text x="20" y="230" font-family="monospace" font-size="8" fill="#475569">TPC: Thread Program Counter within block</text>
  <text x="400" y="218" font-family="monospace" font-size="8" fill="#475569">SGPR: Scalar GPR file (per-lane)</text>
  <text x="400" y="230" font-family="monospace" font-size="8" fill="#475569">VGPR: Vector GPR file (per-lane, per-iteration)</text>
  <text x="640" y="218" font-family="monospace" font-size="8" fill="#475569">PRED: Predicate for predication</text>
  <text x="640" y="230" font-family="monospace" font-size="8" fill="#475569">LB/LC: Loop iteration state</text>
  <!-- Legend -->
  <rect x="10" y="248" width="180" height="44" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
  <rect x="20" y="256" width="12" height="12" fill="#ddd6fe" rx="2"/>
  <text x="38" y="266" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Control</text>
  <rect x="20" y="272" width="12" height="12" fill="#bfdbfe" rx="2"/>
  <text x="38" y="282" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Vector</text>
  <rect x="90" y="256" width="12" height="12" fill="#bbf7d0" rx="2"/>
  <text x="108" y="266" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Memory</text>
  <rect x="90" y="272" width="12" height="12" fill="#f1f5f9" stroke="#cbd5e1" rx="2"/>
  <text x="108" y="282" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#475569">Summary</text>
</svg>
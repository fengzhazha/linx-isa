<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <marker id="a5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="500" height="200" fill="#f8fafc" rx="4"/>
  <text x="250" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Two-Layer Execution Model</text>
  <!-- Prepare -->
  <rect x="20" y="40" width="120" height="130" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="80" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">Prepare</text>
  <rect x="30" y="70" width="100" height="20" fill="#bfdbfe" rx="4"/>
  <text x="80" y="84" font-family="monospace" font-size="9" fill="#1e40af" text-anchor="middle">Fetch block</text>
  <rect x="30" y="95" width="100" height="20" fill="#bfdbfe" rx="4"/>
  <text x="80" y="109" font-family="monospace" font-size="9" fill="#1e40af" text-anchor="middle">Decode header</text>
  <rect x="30" y="120" width="100" height="20" fill="#bfdbfe" rx="4"/>
  <text x="80" y="134" font-family="monospace" font-size="9" fill="#1e40af" text-anchor="middle">Alloc registers</text>
  <rect x="30" y="145" width="100" height="16" fill="#bfdbfe" rx="4"/>
  <text x="80" y="157" font-family="monospace" font-size="8" fill="#1e40af" text-anchor="middle">Setup lanes</text>
  <!-- Arrow 1 -->
  <line x1="140" y1="105" x2="165" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#a5)"/>
  <!-- Execute -->
  <rect x="175" y="40" width="140" height="130" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="8"/>
  <text x="245" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="bold" fill="#7e22ce" text-anchor="middle">Execute</text>
  <rect x="185" y="70" width="120" height="20" fill="#e9d5ff" rx="4"/>
  <text x="245" y="84" font-family="monospace" font-size="9" fill="#7e22ce" text-anchor="middle">Block Engine runs</text>
  <rect x="185" y="95" width="120" height="20" fill="#e9d5ff" rx="4"/>
  <text x="245" y="109" font-family="monospace" font-size="9" fill="#7e22ce" text-anchor="middle">Micro-ops in body</text>
  <rect x="185" y="120" width="120" height="20" fill="#e9d5ff" rx="4"/>
  <text x="245" y="134" font-family="monospace" font-size="9" fill="#7e22ce" text-anchor="middle">Parallel lanes exec</text>
  <rect x="185" y="145" width="120" height="16" fill="#e9d5ff" rx="4"/>
  <text x="245" y="157" font-family="monospace" font-size="8" fill="#7e22ce" text-anchor="middle">Write to tile buf</text>
  <!-- Arrow 2 -->
  <line x1="315" y1="105" x2="340" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#a5)"/>
  <!-- Commit -->
  <rect x="350" y="40" width="130" height="130" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="415" y="60" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">Commit</text>
  <rect x="360" y="70" width="110" height="20" fill="#bbf7d0" rx="4"/>
  <text x="415" y="84" font-family="monospace" font-size="9" fill="#15803d" text-anchor="middle">Finalize results</text>
  <rect x="360" y="95" width="110" height="20" fill="#bbf7d0" rx="4"/>
  <text x="415" y="109" font-family="monospace" font-size="9" fill="#15803d" text-anchor="middle">Commit tile to GMEM</text>
  <rect x="360" y="120" width="110" height="20" fill="#bbf7d0" rx="4"/>
  <text x="415" y="134" font-family="monospace" font-size="9" fill="#15803d" text-anchor="middle">Release registers</text>
  <rect x="360" y="145" width="110" height="16" fill="#bbf7d0" rx="4"/>
  <text x="415" y="157" font-family="monospace" font-size="8" fill="#15803d" text-anchor="middle">Advance TPC</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <marker id="a9" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="a9b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="500" height="200" fill="#f8fafc" rx="4"/>
  <text x="250" y="18" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">XB (Cross-Block) System Call Flow</text>
  <!-- XB instruction -->
  <rect x="20" y="45" width="90" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="65" y="70" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">XB</text>
  <text x="65" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#1e40af" text-anchor="middle">syscall</text>
  <!-- Arrow -->
  <line x1="110" y1="65" x2="135" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a9)"/>
  <!-- CAC_TABLE lookup -->
  <rect x="145" y="35" width="130" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="210" y="52" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="bold" fill="#d97706" text-anchor="middle">CAC_TABLE</text>
  <text x="210" y="66" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">Lookup</text>
  <text x="210" y="78" font-family="monospace" font-size="8" fill="#92400e" text-anchor="middle">EA -> entry</text>
  <!-- Arrow to decision -->
  <line x1="275" y1="65" x2="300" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a9)"/>
  <!-- Decision diamond -->
  <polygon points="320,40 370,65 320,90 270,65" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="320" y="62" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" font-weight="bold" fill="#7e22ce" text-anchor="middle">same</text>
  <text x="320" y="73" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" font-weight="bold" fill="#7e22ce" text-anchor="middle">block?</text>
  <!-- Arrow Yes -->
  <line x1="320" y1="90" x2="320" y2="120" stroke="#334155" stroke-width="2" marker-end="url(#a9)"/>
  <text x="326" y="107" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#15803d">Yes</text>
  <!-- Arrow No -->
  <line x1="370" y1="65" x2="420" y2="65" stroke="#334155" stroke-width="2" marker-end="url(#a9)"/>
  <text x="395" y="58" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#dc2626">No</text>
  <!-- One-block mode -->
  <rect x="275" y="120" width="90" height="45" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="320" y="140" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">One-Block</text>
  <text x="320" y="152" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#15803d" text-anchor="middle">Mode</text>
  <text x="320" y="162" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#64748b" text-anchor="middle">Exec in current block</text>
  <!-- Split-block mode -->
  <rect x="420" y="45" width="70" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="455" y="70" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#dc2626" text-anchor="middle">Split</text>
  <text x="455" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" font-weight="bold" fill="#dc2626" text-anchor="middle">Mode</text>
  <!-- Note -->
  <text x="20" y="188" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#64748b">One-Block: Callee block executes in same context | Split: Preamble + body + postamble in separate blocks</text>
</svg>
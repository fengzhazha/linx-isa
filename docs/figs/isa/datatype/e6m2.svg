<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <style>
    text { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 14px; }
    .title { font-size: 18px; font-weight: bold; fill: #333; }
    .label { font-size: 12px; fill: #555; }
    .bit { font-size: 11px; fill: #333; }
  </style>

  <!-- Title -->
  <text x="10" y="25" class="title">E6M2: Scaling Format</text>

  <!-- Bit position labels -->
  <text x="10" y="50" class="label">8</text>
  <text x="380" y="50" class="label">0</text>

  <!-- Main bit boxes -->
  <g transform="translate(92, 60)">
    <!-- Sign bit -->
    <rect x="0" y="0" width="24" height="80" fill="#808080" rx="3" stroke="#333" stroke-width="1"/>
    <text x="12" y="45" text-anchor="middle" fill="white" class="bit">S</text>
    <text x="12" y="100" text-anchor="middle" class="label">1</text>

    <!-- Exponent bits -->
    <rect x="24" y="0" width="144" height="80" fill="#4169E1" rx="3" stroke="#333" stroke-width="1"/>
    <text x="96" y="45" text-anchor="middle" fill="white" class="bit">E</text>
    <text x="96" y="100" text-anchor="middle" class="label">6</text>

    <!-- Mantissa bits -->
    <rect x="168" y="0" width="48" height="80" fill="#228B22" rx="3" stroke="#333" stroke-width="1"/>
    <text x="192" y="45" text-anchor="middle" fill="white" class="bit">M</text>
    <text x="192" y="100" text-anchor="middle" class="label">2</text>
  </g>

  <!-- Extra label if provided -->

</svg>
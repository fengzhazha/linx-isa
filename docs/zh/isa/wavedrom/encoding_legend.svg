<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" width="860" height="180">
  <rect width="860" height="180" fill="#ffffff"/>
  <text x="24" y="30" font-size="18" font-weight="700" fill="#0f172a">编码字段颜色图例</text>
  <text x="24" y="48" font-size="11" fill="#475569">颜色按字段语义分类，便于快速识别寄存器、立即数、常量和保留位。</text>
  <rect x="28" y="54" width="28" height="18" rx="5" fill="#bbf7d0" stroke="#94a3b8" stroke-width="1.1"/><text x="70" y="67" font-size="12" fill="#0f172a">RegDst / 目的寄存器</text><rect x="418" y="54" width="28" height="18" rx="5" fill="#bae6fd" stroke="#94a3b8" stroke-width="1.1"/><text x="460" y="67" font-size="12" fill="#0f172a">SrcL / SrcR</text><rect x="28" y="88" width="28" height="18" rx="5" fill="#fed7aa" stroke="#94a3b8" stroke-width="1.1"/><text x="70" y="101" font-size="12" fill="#0f172a">SrcD / 第三源</text><rect x="418" y="88" width="28" height="18" rx="5" fill="#fde68a" stroke="#94a3b8" stroke-width="1.1"/><text x="460" y="101" font-size="12" fill="#0f172a">Immediate / Offset</text><rect x="28" y="122" width="28" height="18" rx="5" fill="#e9d5ff" stroke="#94a3b8" stroke-width="1.1"/><text x="70" y="135" font-size="12" fill="#0f172a">Funct / Decode 常量</text><rect x="418" y="122" width="28" height="18" rx="5" fill="#fbcfe8" stroke="#94a3b8" stroke-width="1.1"/><text x="460" y="135" font-size="12" fill="#0f172a">Shamt</text><rect x="28" y="156" width="28" height="18" rx="5" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1.1"/><text x="70" y="169" font-size="12" fill="#0f172a">Reserved / 0</text>
</svg>

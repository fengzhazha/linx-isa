{% extends "base.html" %}

{%- block scripts %}
  {{ super() }}
  <style>
    /* Inline critical overrides that need to be here for the Material theme */
    :root { --md-primary-fg-color: #0891b2; }
    .md-header { box-shadow: 0 0 8px rgba(0,0,0,0.3) !important; }
    .md-nav--secondary { border-left: 3px solid #0891b2; }
    .linx-lang-switcher {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.35rem;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(15,23,42,0.42);
      backdrop-filter: blur(8px);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .linx-lang-switcher a {
      color: #e2e8f0 !important;
      text-decoration: none;
      opacity: 0.72;
    }
    .linx-lang-switcher a.is-active {
      color: #ffffff !important;
      opacity: 1;
    }
  </style>
{%- endblock %}

{%- block site_meta %}
  {{ super() }}
  <meta name="theme-color" content="#0891b2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
{%- endblock %}

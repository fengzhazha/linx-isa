<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Helvetica, Arial, sans-serif; fill: #111827; }
      .label { font: 18px Helvetica, Arial, sans-serif; fill: #111827; }
      .small { font: 15px Helvetica, Arial, sans-serif; fill: #374151; }
      .box { fill: #f9fafb; stroke: #111827; stroke-width: 2; rx: 10; }
      .veca { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 10; }
      .vecb { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
      .tile { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .arrow { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .grid { fill: none; stroke: #9ca3af; stroke-width: 2; }
    </style>
  </defs>

  <text x="30" y="38" class="title">Outer-Product View</text>

  <rect x="40" y="90" width="120" height="180" class="veca"/>
  <text x="63" y="120" class="label">A[:, k]</text>
  <text x="65" y="155" class="small">column</text>
  <line x1="100" y1="175" x2="100" y2="245" class="grid"/>
  <circle cx="100" cy="185" r="6" fill="#0f766e"/>
  <circle cx="100" cy="215" r="6" fill="#0f766e"/>
  <circle cx="100" cy="245" r="6" fill="#0f766e"/>

  <rect x="210" y="145" width="220" height="70" class="vecb"/>
  <text x="293" y="175" class="label">B[k, :]</text>
  <text x="275" y="202" class="small">row</text>
  <circle cx="260" cy="180" r="6" fill="#4338ca"/>
  <circle cx="320" cy="180" r="6" fill="#4338ca"/>
  <circle cx="380" cy="180" r="6" fill="#4338ca"/>

  <path d="M165 180 L200 180" class="arrow"/>
  <path d="M440 180 L510 180" class="arrow"/>

  <rect x="520" y="80" width="320" height="210" class="tile"/>
  <text x="592" y="115" class="label">Rank-1 Update</text>
  <text x="555" y="145" class="small">C tile += A[:, k] x B[k, :]</text>
  <line x1="560" y1="170" x2="800" y2="170" class="grid"/>
  <line x1="560" y1="220" x2="800" y2="220" class="grid"/>
  <line x1="620" y1="155" x2="620" y2="255" class="grid"/>
  <line x1="700" y1="155" x2="700" y2="255" class="grid"/>
  <circle cx="590" cy="145" r="6" fill="#c2410c"/>
  <circle cx="670" cy="145" r="6" fill="#c2410c"/>
  <circle cx="750" cy="145" r="6" fill="#c2410c"/>
  <circle cx="590" cy="195" r="6" fill="#c2410c"/>
  <circle cx="670" cy="195" r="6" fill="#c2410c"/>
  <circle cx="750" cy="195" r="6" fill="#c2410c"/>
  <circle cx="590" cy="245" r="6" fill="#c2410c"/>
  <circle cx="670" cy="245" r="6" fill="#c2410c"/>
  <circle cx="750" cy="245" r="6" fill="#c2410c"/>

  <text x="40" y="320" class="small">Key idea: one column of A and one row of B update many output elements at once.</text>
</svg>

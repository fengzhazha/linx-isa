<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Helvetica, Arial, sans-serif; fill: #111827; }
      .label { font: 18px Helvetica, Arial, sans-serif; fill: #111827; }
      .small { font: 15px Helvetica, Arial, sans-serif; fill: #374151; }
      .bank { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .tree { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .acc { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
      .arrow { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="30" y="38" class="title">outerCube Mode A vs Mode B</text>

  <text x="50" y="78" class="label">Mode A</text>
  <rect x="50" y="95" width="95" height="70" class="bank"/><text x="78" y="137" class="label">Bank0</text>
  <rect x="160" y="95" width="95" height="70" class="bank"/><text x="188" y="137" class="label">Bank1</text>
  <rect x="270" y="95" width="95" height="70" class="bank"/><text x="298" y="137" class="label">Bank2</text>
  <rect x="380" y="95" width="95" height="70" class="bank"/><text x="408" y="137" class="label">Bank3</text>
  <text x="495" y="137" class="label">...</text>
  <rect x="545" y="95" width="95" height="70" class="bank"/><text x="573" y="137" class="label">Bank7</text>

  <path d="M98 170 L98 220" class="arrow"/>
  <path d="M208 170 L208 220" class="arrow"/>
  <path d="M318 170 L318 220" class="arrow"/>
  <path d="M428 170 L428 220" class="arrow"/>
  <path d="M593 170 L593 220" class="arrow"/>

  <rect x="180" y="225" width="330" height="80" class="tree"/>
  <text x="245" y="258" class="label">Inter-bank reduction tree</text>
  <text x="214" y="287" class="small">raise local reduction depth before FP32 update</text>

  <path d="M510 265 L610 265" class="arrow"/>
  <rect x="625" y="225" width="190" height="80" class="acc"/>
  <text x="685" y="258" class="label">Shared FP32</text>
  <text x="708" y="287" class="label">Accumulator</text>
  <text x="55" y="330" class="small">Banks work on different K groups, then merge before psum update.</text>

  <text x="50" y="390" class="label">Mode B</text>
  <rect x="50" y="405" width="95" height="40" class="bank"/><text x="77" y="431" class="small">Bank0</text>
  <rect x="180" y="405" width="95" height="40" class="bank"/><text x="207" y="431" class="small">Bank1</text>
  <rect x="310" y="405" width="95" height="40" class="bank"/><text x="337" y="431" class="small">Bank2</text>
  <rect x="440" y="405" width="95" height="40" class="bank"/><text x="467" y="431" class="small">Bank3</text>

  <path d="M98 395 L98 355" class="arrow"/>
  <path d="M228 395 L228 355" class="arrow"/>
  <path d="M358 395 L358 355" class="arrow"/>
  <path d="M488 395 L488 355" class="arrow"/>

  <rect x="55" y="310" width="85" height="38" class="acc"/><text x="72" y="335" class="small">Acc0</text>
  <rect x="185" y="310" width="85" height="38" class="acc"/><text x="202" y="335" class="small">Acc1</text>
  <rect x="315" y="310" width="85" height="38" class="acc"/><text x="332" y="335" class="small">Acc2</text>
  <rect x="445" y="310" width="85" height="38" class="acc"/><text x="462" y="335" class="small">Acc3</text>
  <text x="575" y="332" class="small">No inter-bank reduction.</text>
  <text x="575" y="358" class="small">Each bank updates its own FP32 psum more often.</text>
</svg>

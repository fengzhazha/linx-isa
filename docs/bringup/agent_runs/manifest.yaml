{
  "version": 1,
  "policy": {
    "enforcement": "strict_always",
    "required_gate_rule": "all_required_non_waived_must_pass",
    "gate_key_format": "Domain::Gate",
    "canonical_report": "docs/bringup/gates/latest.json",
    "blocker_policy": "documented_waiver_only"
  },
  "agent_scope_policy": {
    "explicit_modules_required": true,
    "allow_multi_module_agents": true,
    "max_modules_per_agent": 3,
    "cross_module_agents": ["libc", "integration"],
    "allowed_modules": [
      "superproject",
      "skills/linx-skills",
      "compiler/llvm",
      "emulator/qemu",
      "kernel/linux",
      "lib/glibc",
      "lib/musl",
      "workloads/spec2017",
      "isa",
      "docs",
      "tools/model",
      "rtl/LinxCore",
      "tools/pyCircuit"
    ],
    "canonical_skill_names": [
      "linx-superproject",
      "linx-compiler",
      "linx-qemu",
      "linx-linux",
      "linx-core",
      "linx-pycircuit",
      "linx-model",
      "linx-lib",
      "linx-isa",
      "linx-skills-submodule"
    ],
    "domain_module_map": {
      "ISA": ["isa", "docs", "superproject"],
      "Architecture": ["docs", "isa", "superproject"],
      "Compiler": ["compiler/llvm"],
      "Emulator": ["emulator/qemu"],
      "Kernel": ["kernel/linux"],
      "Library": ["lib/glibc", "lib/musl"],
      "LinxCore": ["rtl/LinxCore"],
      "Testbench": ["rtl/LinxCore"],
      "pyCircuit": ["tools/pyCircuit"],
      "LinxTrace": ["rtl/LinxCore", "docs", "superproject"],
      "Integration": ["superproject", "skills/linx-skills", "docs"],
      "SPEC": ["workloads/spec2017"],
      "Model": ["tools/model", "tools/pyCircuit", "emulator/qemu", "superproject"],
      "Regression": ["superproject", "workloads/spec2017"]
    }
  },
  "phase_policy": {
    "phases": ["FOUNDATION", "CORE-CLOSURE", "LINUX-RUNTIME", "HOSTED-RUNTIME", "WORKLOAD-RUNTIME", "PROMOTION"],
    "active_phase": "LINUX-RUNTIME",
    "waiver_mode": "phase_bound_expiry",
    "require_phase_bound_waivers": true
  },
  "benchmark_flow_policy": {
    "canonical_flow": "docs/bringup/benchmark_qemu_linux_flow.json",
    "canonical_runner": "tools/bringup/run_benchmark_linux_flow.py",
    "artifact_root": "workloads/generated",
    "hard_break_rule": "Do not run a downstream benchmark/Linux/SPEC stage until every upstream hard-break stage is green in the same lane.",
    "stage_order": [
      "source-contract",
      "compiler-contract",
      "qemu-contract",
      "tsvc-qemu-hardbreak",
      "linux-userspace-entry",
      "libc-hosted-runtime",
      "full-benchmarks"
    ],
    "stage_owners": {
      "source-contract": "integration",
      "compiler-contract": "llvm",
      "qemu-contract": "qemu",
      "tsvc-qemu-hardbreak": "integration",
      "linux-userspace-entry": "linux",
      "libc-hosted-runtime": "libc",
      "full-benchmarks": "integration"
    }
  },
  "phase_gate_requirements": {
    "FOUNDATION": {
      "required_gate_keys": [
        "Architecture::LinxCore architecture contract lint",
        "Architecture::mkdocs architecture nav/docs",
        "LinxCore::stage/connectivity lint",
        "LinxCore::opcode parity",
        "LinxCore::runner protocol",
        "LinxCore::trace schema and memory smoke",
        "LinxCore::cosim smoke",
        "Testbench::ROB bookkeeping",
        "Testbench::block struct pyc flow smoke",
        "pyCircuit::CPU C++ smoke",
        "pyCircuit::QEMU vs pyCircuit trace diff",
        "pyCircuit::interface contract gate",
        "LinxTrace::contract sync lint",
        "LinxTrace::sample trace lint",
        "LinxTrace::semver compatibility gate"
      ]
    }
  },
  "agents": {
    "llvm": {
      "owner": "compiler",
      "checklist": "compiler_llvm.md",
      "description": "Linx LLVM toolchain and compile-gate owner",
      "modules": ["compiler/llvm"],
      "skill": "linx-compiler"
    },
    "qemu": {
      "owner": "emulator",
      "checklist": "emulator_qemu.md",
      "description": "Linx QEMU runtime and strict-system owner",
      "modules": ["emulator/qemu"],
      "skill": "linx-qemu"
    },
    "linux": {
      "owner": "kernel",
      "checklist": "kernel_linux.md",
      "description": "Linx Linux boot/initramfs/9p owner",
      "modules": ["kernel/linux"],
      "skill": "linx-linux"
    },
    "libc": {
      "owner": "library",
      "checklist": "libc_runtime.md",
      "description": "musl/glibc runtime and sysroot owner",
      "modules": ["lib/glibc", "lib/musl"],
      "skill": "linx-lib"
    },
    "spec": {
      "owner": "spec",
      "checklist": "specint_qemu.md",
      "description": "SPEC2017 intrate build+run owner",
      "modules": ["workloads/spec2017"],
      "skill": "linx-superproject"
    },
    "arch": {
      "owner": "architecture",
      "checklist": "architecture_docs.md",
      "description": "LinxArch architecture-contract and docs-gate owner",
      "modules": ["docs"],
      "skill": "linx-isa"
    },
    "linxcore": {
      "owner": "rtl",
      "checklist": "linxcore_rtl.md",
      "description": "LinxCore RTL superscalar bring-up owner",
      "modules": ["rtl/LinxCore"],
      "skill": "linx-core"
    },
    "testbench": {
      "owner": "verification",
      "checklist": "testbench_verif.md",
      "description": "LinxCore testbench and verification matrix owner",
      "modules": ["rtl/LinxCore"],
      "skill": "linx-core"
    },
    "pycircuit": {
      "owner": "model",
      "checklist": "pycircuit_model.md",
      "description": "pyCircuit model and flow owner",
      "modules": ["tools/pyCircuit"],
      "skill": "linx-pycircuit"
    },
    "trace": {
      "owner": "trace",
      "checklist": "trace_linxtrace.md",
      "description": "LinxTrace and viewer-contract owner",
      "modules": ["rtl/LinxCore"],
      "skill": "linx-core"
    },
    "integration": {
      "owner": "bringup",
      "checklist": "integration_release.md",
      "description": "cross-repo closure and release gate owner",
      "modules": ["superproject", "skills/linx-skills", "docs"],
      "skill": "linx-superproject"
    }
  },

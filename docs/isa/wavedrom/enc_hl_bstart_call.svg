<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 70" width="810" height="70">
  <defs><style>text{font-family:"Courier New",monospace}</style></defs>
  <text x="10" y="17" font-family="Helvetica Neue,Arial" font-weight="bold" font-size="14" fill="#1A1A2E">HL.BSTART CALL</text>
  <!-- bit number ticks -->
  <text x="17.8" y="9" text-anchor="middle" font-size="8" fill="#888888">47</text>
  <text x="64.8" y="9" text-anchor="middle" font-size="8" fill="#888888">44</text>
  <text x="127.5" y="9" text-anchor="middle" font-size="8" fill="#888888">40</text>
  <text x="190.2" y="9" text-anchor="middle" font-size="8" fill="#888888">36</text>
  <text x="252.8" y="9" text-anchor="middle" font-size="8" fill="#888888">32</text>
  <text x="315.5" y="9" text-anchor="middle" font-size="8" fill="#888888">28</text>
  <text x="378.2" y="9" text-anchor="middle" font-size="8" fill="#888888">24</text>
  <text x="440.8" y="9" text-anchor="middle" font-size="8" fill="#888888">20</text>
  <text x="503.5" y="9" text-anchor="middle" font-size="8" fill="#888888">16</text>
  <text x="566.2" y="9" text-anchor="middle" font-size="8" fill="#888888">12</text>
  <text x="628.8" y="9" text-anchor="middle" font-size="8" fill="#888888">8</text>
  <text x="691.5" y="9" text-anchor="middle" font-size="8" fill="#888888">4</text>
  <text x="754.2" y="9" text-anchor="middle" font-size="8" fill="#888888">0</text>
  <!-- outer border -->
  <rect x="10" y="28" width="792.00" height="14" fill="none" stroke="#555555" stroke-width="0.8"/>
  <!-- [47:43] 5 bits — opcode base 5'b01010, fixed -->
  <rect x="10.000" y="29" width="82.500" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="51.2" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">0x0A</text>
  <!-- [42:38] 5 bits — uimm5, reserved, must be 0 -->
  <rect x="92.500" y="29" width="82.500" height="12" fill="#F4A261" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="133.8" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#3A1A00" pointer-events="none">uimm5</text>
  <!-- [37:36] 2 bits — xfer_kind class = 2'b01, fixed -->
  <rect x="175.000" y="29" width="33.000" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="191.5" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">01</text>
  <!-- [35:33] 3 bits — block_type=STD(0b000) + contract_kind(0), fixed -->
  <rect x="208.000" y="29" width="49.500" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="232.8" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">011</text>
  <!-- [32:32] 1 bit — reserved 0 -->
  <rect x="257.500" y="29" width="16.500" height="12" fill="#E0E0E0" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="265.8" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">0</text>
  <!-- [31:7] 25 bits — simm25, signed PC-relative target, << 1 -->
  <rect x="274.000" y="29" width="412.500" height="12" fill="#F4A261" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="480.3" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#3A1A00" pointer-events="none">simm25</text>
  <!-- [6:4] 3 bits — xfer_kind[3:2] = 2'b00, combined with [21:20]=2'b01 gives CALL=0b0011 -->
  <rect x="686.500" y="29" width="49.500" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="711.3" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">001</text>
  <!-- [3:1] 3 bits — reserved, fixed 3'b000 -->
  <rect x="736.000" y="29" width="49.500" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="760.8" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">000</text>
  <!-- [0:0] 1 bit — HL terminal = 1, fixed -->
  <rect x="785.500" y="29" width="16.500" height="12" fill="#C8C8C8" stroke="white" stroke-width="0.5" rx="1"/>
  <text x="793.8" y="38.5" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#424242" pointer-events="none">1</text>
  <text x="10" y="65" font-size="9" fill="#AAAAAA" font-family="Helvetica Neue,Arial,sans-serif">48-bit HL. encoding</text>
</svg>
